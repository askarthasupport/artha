<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Artha Legal Pages</title>
  <style>
    :root {
      color-scheme: light;
      --text: #17202a;
      --muted: #5d6875;
      --border: #d9e0e7;
      --bg: #f7f9fb;
      --card: #ffffff;
      --accent: #126b57;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      line-height: 1.6;
    }

    main {
      width: min(760px, calc(100% - 32px));
      margin: 48px auto;
      padding: 32px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 2rem;
      line-height: 1.2;
    }

    p {
      margin: 0 0 20px;
      color: var(--muted);
    }

    ul {
      margin: 0;
      padding-left: 22px;
    }

    li {
      margin: 8px 0;
    }

    a {
      color: var(--accent);
      font-weight: 700;
      text-decoration: none;
    }

    a:hover,
    a:focus {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <main>
    <h1>Artha</h1>
    <p>Legal and support pages for Artha app.</p>

    <ul>
      <li><a href="privacy-policy.html">Privacy Policy</a></li>
      <li><a href="terms-and-conditions.html">Terms and Conditions</a></li>
      <li><a href="support.html">Support</a></li>
    </ul>
  </main>
</body>
</html>
